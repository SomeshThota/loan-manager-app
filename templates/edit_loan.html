{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="mb-2">
            <a href="{{ url_for('client_detail', client_id=loan.client_id) }}" class="btn btn-sm btn-outline-secondary">Back to client</a>
        </div>
        <div class="card shadow-sm">
            <div class="card-header fw-bold">Edit Loan Entry</div>
            <div class="card-body">
                <form method="post" class="big-form">
                    <div class="mb-3">
                        <label class="form-label">Principal</label>
                        <input type="number" step="0.01" min="0" name="principal" class="form-control form-control-lg"
                            value="{{ '%.2f'|format(loan.principal) }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Interest per month (%)</label>
                        <input type="number" step="0.1" min="0" name="monthly_rate" class="form-control form-control-lg"
                            value="{{ '%.2f'|format(loan.monthly_rate) }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Given Date</label>
                        <input type="date" name="given_date" class="form-control form-control-lg"
                            value="{{ loan.given_date }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Due Date</label>
                        <input type="date" name="due_date" class="form-control form-control-lg"
                            value="{{ loan.due_date }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Notes</label>
                        <textarea name="notes" class="form-control" rows="2">{{ loan.notes }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">Save Changes</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
